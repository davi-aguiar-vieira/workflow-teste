# =============================================================
# Apache Ranger Admin – install.properties
# Values that depend on runtime environment are overridden by
# the entrypoint script using environment variables.
# =============================================================

PYTHON_COMMAND_INVOKER=python3

# ---- Database (PostgreSQL) -------------------------------------
DB_FLAVOR=POSTGRES
SQL_CONNECTOR_JAR=/opt/postgresql-jdbc.jar

db_root_user=ranger_user
db_root_password=ranger_pass
db_host=ranger-postgres
db_port=5432
db_name=ranger
db_user=ranger_user
db_password=ranger_pass

# Do NOT try to create the DB user – it already exists in Docker
create_db_user=false

# ---- Ranger service URL ----------------------------------------
policymgr_external_url=http://ranger-admin:6080
ranger_service_http_enabled=true
ranger_service_http_port=6080
ranger_service_https_attrib_ssl_enabled=false

# ---- Ranger admin credentials ----------------------------------
rangerAdmin_password=rangeradmin1
rangerTagsync_password=rangeradmin1
rangerUsersync_password=rangeradmin1
keyadmin_password=rangeradmin1

# ---- Audit (disabled – no Solr/Elasticsearch required) ---------
audit_store=
audit_solr_urls=
audit_solr_zookeepers=
audit_elasticsearch_urls=
audit_elasticsearch_port=
audit_elasticsearch_user=
audit_elasticsearch_password=
audit_elasticsearch_index=

# ---- Unix user for service processes ---------------------------
unix_user=root
unix_user_pwd=root
unix_group=root
